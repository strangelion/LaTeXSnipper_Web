name: 同步 Release 到 R2

on:
  schedule:
    - cron: '7 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      should_sync: ${{ steps.decide.outputs.should_sync }}
      changed_assets: ${{ steps.decide.outputs.changed_assets }}
      should_build_manual: ${{ steps.check_manual.outputs.manual_updated }}
    steps:
      - uses: actions/checkout@v4

      - name: 检查各 Release 文件时间戳
        id: decide
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess

          ASSETS = [
              "LaTeXSnipperSetup-2.3.2.exe",
              "LaTeXSnipper_2.3.2_amd64.deb",
              "LaTeXSnipper_2.3.2_arm64.dmg",
              "OfficePluginSetup-2.3.2_Final_Stable.exe",
          ]

          # Fetch release assets information
          url = "https://api.github.com/repos/SakuraMathcraft/LaTeXSnipper/releases/tags/v2.3.2_Final_Stable"
          result = subprocess.run(
              ["curl", "-sL", "--retry", "2", "-H", "Accept: application/vnd.github+json", url],
              capture_output=True, text=True
          )
          release = json.loads(result.stdout)
          api_assets = {a["name"]: a["updated_at"] for a in release.get("assets", []) if a.get("name") in ASSETS}
          print("API asset timestamps:", json.dumps(api_assets, indent=2))

          # Read stored state (single file, merged with manual state)
          state = {}
          if os.path.exists(".release_state.json"):
              with open(".release_state.json") as f:
                  state = json.load(f)

          stored = state.get("assets", {})
          is_manual = os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch"

          # Determine changed assets by comparing timestamps per-file
          changed = []
          for name in ASSETS:
              api_ts = api_assets.get(name)
              if not api_ts or api_ts == "null":
                  print(f"  {name}: no timestamp in API, skip")
                  continue
              stored_ts = stored.get(name)
              if is_manual or api_ts != stored_ts:
                  print(f"  {name}: changed  {stored_ts or '(none)'}  ->  {api_ts}")
                  changed.append(name)
              else:
                  print(f"  {name}: unchanged  ({api_ts})")

          should_sync = "true" if (changed or is_manual) else "false"

          # Write outputs for subsequent jobs
          github_output = os.environ.get("GITHUB_OUTPUT")
          if github_output:
              with open(github_output, "a") as f:
                  f.write(f"should_sync={should_sync}\n")
                  f.write(f"changed_assets={json.dumps(changed)}\n")

          # Update state file with new timestamps (only when something changed)
          if changed:
              for name in changed:
                  stored[name] = api_assets.get(name, "")
              state["assets"] = stored
              all_ts = [v for v in stored.values() if v]
              state["last_sync"] = max(all_ts) if all_ts else ""
              with open(".release_state.json", "w") as f:
                  json.dump(state, f, indent=2)
                  f.write("\n")
              print("State updated with new timestamps")

          print(f"should_sync={should_sync}")
          print(f"changed_assets={json.dumps(changed)}")
          PYEOF

      - name: 检查上游用户手册是否更新（写入同一个状态文件）
        id: check_manual
        if: github.event_name == 'schedule'
        run: |
          UPSTREAM_SHA=$(curl -sL -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/SakuraMathcraft/LaTeXSnipper/contents/user_manual/user_manual.typ" \
            | jq -r '.sha')
          echo "Upstream SHA: $UPSTREAM_SHA"

          MANUAL_UPDATED=false
          if [ -f .release_state.json ]; then
              LAST_SHA=$(jq -r '.last_manual_sha // empty' .release_state.json)
              if [ "$UPSTREAM_SHA" != "$LAST_SHA" ] && [ "$UPSTREAM_SHA" != "null" ] && [ -n "$UPSTREAM_SHA" ]; then
                  MANUAL_UPDATED=true
                  echo "Manual updated: $LAST_SHA -> $UPSTREAM_SHA"
                  jq --arg sha "$UPSTREAM_SHA" '.last_manual_sha = $sha' .release_state.json > .release_state.tmp && mv .release_state.tmp .release_state.json
              else
                  echo "Manual unchanged"
              fi
          fi
          echo "manual_updated=$MANUAL_UPDATED" >> $GITHUB_OUTPUT

      - name: 保存状态文件（仅当有变动时提交）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .release_state.json 2>/dev/null || true
          git diff --staged --quiet && echo "No state change" || (echo "Committing state update" && git commit -m "chore: update sync state" && git pull --rebase && git push)

  sync:
    needs: check
    if: needs.check.outputs.should_sync == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: 下载并上传变更文件到 R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          CHANGED='${{ needs.check.outputs.changed_assets }}'
          python3 << PYEOF
          import json, os, subprocess, hashlib, sys

          changed = json.loads(os.environ.get('CHANGED', '[]'))
          if not changed:
              print('No changed files to sync, exiting')
              sys.exit(0)

          os.makedirs('.sync_tmp', exist_ok=True)
          for name in changed:
              url = f'https://github.com/SakuraMathcraft/LaTeXSnipper/releases/download/v2.3.2_Final_Stable/{name}'
              out = f'.sync_tmp/{name}'
              print(f'Downloading {name}...')
              subprocess.run(['curl', '-sL', '--retry', '2', url, '-o', out], check=True)
              sha = hashlib.sha256(open(out, 'rb').read()).hexdigest()
              print(f'  SHA256: {sha}')

              subprocess.run(['npx', 'wrangler', 'r2', 'object', 'delete', f'release/{name}', '--remote'],
                          capture_output=True, timeout=60000)
              subprocess.run(['npx', 'wrangler', 'r2', 'object', 'put', f'release/{name}', '--file', out, '--remote'],
                          check=True, timeout=120000)
              print(f'  Uploaded release/{name}')
              with open('/tmp/sha256.txt', 'a') as f:
                  f.write(f'{name}:{sha}\n')

          subprocess.run(['rm', '-rf', '.sync_tmp'])
          PYEOF

      - name: 更新 download.html SHA256
        run: |
          python3 << 'PYEOF'
          import re

          sha_map = {}
          try:
              with open('/tmp/sha256.txt') as f:
                  for line in f:
                      parts = line.strip().split(':')
                      if len(parts) >= 2:
                          sha_map[parts[0]] = parts[1]
          except FileNotFoundError:
              print("No sha256.txt found, nothing to update")
              exit(0)

          pairs = [
              ('LaTeXSnipperSetup-2.3.2.exe', sha_map.get('LaTeXSnipperSetup-2.3.2.exe', '')),
              ('LaTeXSnipper_2.3.2_amd64.deb', sha_map.get('LaTeXSnipper_2.3.2_amd64.deb', '')),
              ('LaTeXSnipper_2.3.2_arm64.dmg', sha_map.get('LaTeXSnipper_2.3.2_arm64.dmg', '')),
              ('OfficePluginSetup-2.3.2_Final_Stable.exe', sha_map.get('OfficePluginSetup-2.3.2_Final_Stable.exe', '')),
          ]

          def update_file(filepath):
              with open(filepath, 'r', encoding='utf-8') as f:
                  html = f.read()
              changed = False
              for filename, sha in pairs:
                  if not sha: continue
                  escaped = re.escape(filename)
                  cur_match = re.search(
                      r'<a\s+class="download-btn"\s+href="[^"]*' + escaped + r'"[^>]*>[^<]*</a>\s*<p\s+class="sha256"\s+data-sha256="([^"]*)"',
                      html
                  )
                  if cur_match and cur_match.group(1) == sha:
                      print(f"  {filepath}: {filename} already correct")
                      continue
                  pattern = re.compile(
                      r'(<a\s+class="download-btn"\s+href="[^"]*' + escaped + r'"[^>]*>[^<]*</a>\s*<p\s+class="sha256"\s+data-sha256=")[^"]*(")',
                  )
                  new_html = pattern.sub(r'\g<1>' + sha + r'\g<2>', html)
                  if new_html != html:
                      html = new_html
                      changed = True
                      print(f"  {filepath}: {filename} sha256 updated")
                  else:
                      print(f"  {filepath}: {filename} no_match")
              if changed:
                  with open(filepath, 'w') as f:
                      f.write(html)
              return changed

          c1 = update_file('download.html')
          c2 = update_file('dist/download.html')
          PYEOF

      - name: 提交 SHA256 更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download.html dist/download.html
          git diff --staged --quiet && echo "No SHA256 changes" || (git commit -m "chore: sync release SHA256" && git pull --rebase && git push)

  build-manual:
    needs: check
    if: needs.check.outputs.should_build_manual == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 触发用户手册构建
        run: |
          curl -sL -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-manual.yml/dispatches" \
            -d '{"ref":"master"}'
          echo "Triggered build-manual workflow"
