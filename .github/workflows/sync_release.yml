name: 同步 Release 到 R2

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 下载 Release 文件并计算 SHA256
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          mkdir -p .sync_tmp

          declare -A ASSETS=(
            ["LaTeXSnipperSetup-2.3.2.exe"]="LaTeXSnipperSetup-2.3.2.exe"
            ["latexsnipper_2.3.2_amd64.deb"]="latexsnipper_2.3.2_amd64.deb"
            ["LaTeXSnipper_2.3.2_arm64.dmg"]="LaTeXSnipper_2.3.2_arm64.dmg"
            ["LaTeXSnipper_User_Manual.pdf"]="LaTeXSnipper_Manual.pdf"
          )

          for NAME in "${!ASSETS[@]}"; do
            R2KEY="${ASSETS[$NAME]}"
            URL="https://github.com/SakuraMathcraft/LaTeXSnipper/releases/download/v2.3.2_Final_Stable/$NAME"
            echo "⬇ $NAME"
            curl -sL "$URL" -o ".sync_tmp/$NAME"
            SHA=$(sha256sum ".sync_tmp/$NAME" | cut -d' ' -f1)
            echo "  SHA256: $SHA"

            # 删除旧 R2 文件并上传新文件
            npx wrangler r2 object delete "release/$R2KEY" 2>/dev/null || true
            npx wrangler r2 object put "release/$R2KEY" --file ".sync_tmp/$NAME"

            echo "$R2KEY:$SHA" >> /tmp/sha256.txt
          done
          rm -rf .sync_tmp

      - name: 更新 download.html SHA256（仅当不同时）
        run: |
          python3 << 'PYEOF'
          import re
          with open('download.html', 'r', encoding='utf-8') as f:
              html = f.read()

          sha_map = {}
          with open('/tmp/sha256.txt', 'r') as f:
              for line in f:
                  r2name, sha = line.strip().split(':')
                  sha_map[r2name] = sha

          pairs = [
              ('LaTeXSnipperSetup-2.3.2.exe',  sha_map.get('LaTeXSnipperSetup-2.3.2.exe', '')),
              ('latexsnipper_2.3.2_amd64.deb', sha_map.get('latexsnipper_2.3.2_amd64.deb', '')),
              ('LaTeXSnipper_2.3.2_arm64.dmg', sha_map.get('LaTeXSnipper_2.3.2_arm64.dmg', '')),
          ]
          for filename, sha in pairs:
              if not sha: continue
              pattern = re.compile(
                  r'(<a\s+class="download-btn"\s+href="[^"]*' + re.escape(filename) + r'"[^>]*>.*?</a>\s*<p\s+class="sha256"\s+data-sha256=")[^"]*(")',
                  re.DOTALL
              )
              new_html = pattern.sub(r'\1' + sha + r'\2', html)
              if new_html != html:
                  html = new_html
                  print(f"  ✓ {filename} SHA256 updated → {sha[:16]}...")
              else:
                  print(f"  - {filename} SHA256 already correct")
          with open('download.html', 'w', encoding='utf-8') as f:
              f.write(html)
          PYEOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download.html
          git diff --staged --quiet || (git commit -m "chore: 同步 Release SHA256" && git push)
