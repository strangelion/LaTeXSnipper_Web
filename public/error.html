<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
  <title>页面出错了 — LaTeXSnipper</title>
  <link rel="icon" type="image/png" href="assets/images/icon.png">
  <script>
    try { var s = localStorage.getItem('latexSnipper-theme'); if (s === 'dark' || s === 'light') document.documentElement.setAttribute('data-theme', s); } catch (e) {}
  </script>
  <link rel="stylesheet" href="styles/styles.css" media="all">
  <style>
    html { background: var(--bg); }
    body { background: transparent; }

    #mathBg {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
    }
    .spacer-top { height: 60px; }

    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--hdr-bg);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border-color);
      will-change: transform; transform: translateZ(0);
    }
    .top-nav .inner {
      max-width: var(--max-w); margin: 0 auto; padding: 0 1.25rem;
      height: 48px; display: flex; align-items: center; gap: 1rem;
    }
    .top-nav a { color: var(--fg); text-decoration: none; font-size: 0.9rem; }
    .top-nav a:hover { color: var(--accent); }
    .top-nav .brand-link { font-weight: 700; font-size: 1rem; }
    .theme-toggle {
      margin-left: auto; background: none;
      border: 1px solid var(--border-color); border-radius: 20px;
      padding: 6px 12px; cursor: pointer; font-size: 0.85rem;
      display: flex; align-items: center; gap: 6px; color: var(--fg);
      transition: background 0.2s, border-color 0.2s; backdrop-filter: blur(4px);
    }
    .theme-toggle:hover { background: rgba(128,128,128,0.1); border-color: var(--accent); }
    .theme-icon { flex-shrink: 0; display: block; }
    .theme-label { line-height: 1; white-space: nowrap; }

    .error-page {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 4rem 1.25rem 5rem;
      text-align: center;
    }

    .error-code {
      font-size: 7rem;
      font-weight: 900;
      line-height: 1;
      margin: 0 0 0.5rem;
      background: linear-gradient(135deg, var(--accent) 0%, #a855f7 50%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.03em;
    }

    .error-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      opacity: 0.85;
    }

    .error-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0 0 0.75rem;
      color: var(--fg);
    }

    .error-desc {
      font-size: 1.05rem;
      color: var(--muted);
      margin: 0 auto 2.5rem;
      max-width: 520px;
      line-height: 1.7;
    }

    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 20px rgba(37, 99, 235, 0.35);
    }
    .btn-outline {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(4px);
    }
    .btn-outline:hover {
      background: rgba(128,128,128,0.08);
      border-color: var(--accent);
    }

    /* 数学公式装饰卡片 */
    .error-formula-card {
      display: inline-block;
      margin-top: 1rem;
      padding: 1.25rem 2.25rem;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: var(--card-shadow);
    }
    .error-formula {
      font-family: "Times New Roman", serif;
      font-size: 1.3rem;
      font-style: italic;
      color: var(--muted);
      margin: 0;
      line-height: 1.8;
    }
    .error-formula span {
      color: var(--accent);
      font-weight: 700;
    }

    /* 调试信息区 */
    .debug-section {
      margin-top: 2.5rem;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      font-size: 0.82rem;
      color: var(--muted);
      text-align: left;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
      display: none;
    }
    .debug-section.visible { display: block; }
    .debug-section summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 0.5rem;
    }
    .debug-section code {
      font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
      font-size: 0.78rem;
      word-break: break-all;
    }

    @media (max-width: 640px) {
      .error-code { font-size: 5rem; }
      .error-title { font-size: 1.25rem; }
      .error-desc { font-size: 0.9rem; }
      .error-actions { flex-direction: column; align-items: center; }
      .btn { width: 100%; max-width: 280px; justify-content: center; }
      .error-formula { font-size: 1rem; }
      .error-icon { width: 56px; height: 56px; }
    }
  </style>
</head>
<body>
  <!-- 数学粒子背景 -->
  <canvas id="mathBg" aria-hidden="true"></canvas>

  <!-- 顶栏 -->
  <nav class="top-nav">
    <div class="inner">
      <a href="index.html" class="brand-link">LaTeXSnipper</a>

  <div class="spacer-top"></div>

  <div class="error-page">
    <!-- 错误图标：用 SVG 表示"找不到"的概念 -->
    <div class="error-icon">
      <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" fill="none">
        <!-- 外圆虚线 -->
        <circle cx="40" cy="40" r="36" stroke="currentColor" stroke-width="2" stroke-dasharray="6 4" opacity="0.3"/>
        <!-- 内圆 -->
        <circle cx="40" cy="40" r="28" stroke="currentColor" stroke-width="1.5" opacity="0.15"/>
        <!-- 问号 -->
        <text x="40" y="51" text-anchor="middle" font-size="32" font-weight="700" fill="currentColor" opacity="0.7" font-family="Times New Roman, serif" font-style="italic">?</text>
        <!-- 外围数学符号 -->
        <text x="40" y="13" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.35" font-family="Times New Roman, serif">&#x2211;</text>
        <text x="40" y="75" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.35" font-family="Times New Roman, serif">&#x222B;</text>
        <text x="11" y="44" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.35" font-family="Times New Roman, serif">&#x2202;</text>
        <text x="69" y="44" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.35" font-family="Times New Roman, serif">&#x03C0;</text>
        <text x="21" y="24" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.25" font-family="Times New Roman, serif">&#x2200;</text>
        <text x="59" y="24" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.25" font-family="Times New Roman, serif">&#x2203;</text>
      </svg>
    </div>

    <!-- 错误码 -->
    <p class="error-code" id="errorCode">404</p>

    <!-- 标题 -->
    <h1 class="error-title" id="errorTitle">页面未找到</h1>

    <!-- 描述 -->
    <p class="error-desc" id="errorDesc">
      你访问的页面可能已被移动、删除，或者地址输入有误。可以试试下面的链接，或者检查一下 URL 是否正确。
    </p>

    <!-- 操作按钮 -->
    <div class="error-actions">
      <a href="index.html" class="btn btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        返回首页
      </a>
      <a href="user_manual.html" class="btn btn-outline">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        查看用户手册
      </a>
      <a href="download.html" class="btn btn-outline">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12l4 4 4-4"/><line x1="12" y1="8" x2="12" y2="16"/></svg>
        下载软件
      </a>
    </div>

    <!-- 数学公式装饰 -->
    <div class="error-formula-card">
      <p class="error-formula">
        <span>&exist;</span> x &isin; &real; : <span>f</span>(x) = 0<br>
        &int;<sub>0</sub><sup>&infin;</sup> <span>e</span><sup>&minus;x&sup2;</sup> dx = <span>&radic;&pi;</span> / 2
      </p>
    </div>

    <!-- 调试信息（可展开） -->
    <details class="debug-section" id="debugSection">
      <summary>技术信息（调试用）</summary>
      <p>请求路径: <code id="debugPath">-</code></p>
      <p>时间戳: <code id="debugTime">-</code></p>
      <p>错误类型: <code id="debugType">-</code></p>
    </details>
  </div>

  <script>
    // ── 根据 URL 参数决定错误类型 ──
    (function() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code') || '404';
      var path = params.get('path') || window.location.pathname || '/';

      var titles = {
        '400': '请求无效',
        '403': '禁止访问',
        '404': '页面未找到',
        '405': '方法不允许',
        '500': '服务器内部错误',
        '502': '网关错误',
        '503': '服务暂不可用',
        '504': '网关超时'
      };
      var descs = {
        '400': '服务器无法理解这个请求。可能是 URL 格式不正确，或者请求参数有误。',
        '403': '你没有权限访问这个页面。如果这是误判，请联系站点管理员。',
        '404': '你访问的页面可能已被移动、删除，或者地址输入有误。可以试试下面的链接，或者检查一下 URL 是否正确。',
        '405': '这个请求方法不被允许。请尝试使用正确的访问方式。',
        '500': '服务器遇到了意外情况，无法完成你的请求。请稍后再试，如果问题持续出现，请在 GitHub 提交 Issue。',
        '502': '上游服务器返回了无效响应。这通常是临时问题，稍等片刻再刷新试试。',
        '503': '服务当前不可用，可能正在维护或负载过高。请稍后重试。',
        '504': '上游服务器响应超时。请稍后再试，如果频繁出现请联系管理员。'
      };

      document.getElementById('errorCode').textContent = code;

      var title = titles[code] || '出错了';
      document.getElementById('errorTitle').textContent = title;

      var desc = descs[code] || '发生了未知错误。请尝试返回首页，或联系站点管理员。';
      document.getElementById('errorDesc').textContent = desc;

      // 调试信息
      document.getElementById('debugPath').textContent = path;
      document.getElementById('debugTime').textContent = new Date().toISOString();
      document.getElementById('debugType').textContent = code + ' — ' + title;

      // 非 404 错误显示调试区
      if (code !== '404') {
        document.getElementById('debugSection').classList.add('visible');
      }
    })();

    // ── 粒子背景 ──
    !function () {
      var canvas = document.getElementById('mathBg');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      if (!ctx) return;

      var SYMBOLS = ['∑','∫','∂','∇','√','π','∞','≈','≠','≤','≥','Δ','Σ','λ','θ','α','β','γ','δ','ε','μ','σ','τ','ω','φ','ψ','×','÷','±','∓','∠','⊥','∈','∩','∪','⊂','⊃','∀','∃','∧','∨','⊕','⊗','∴','∵','∼','≅','≡','ℕ','ℤ','ℚ','ℝ','ℂ','ℵ'];
      var FORMULAS = ['e^{iπ}+1=0','∫e^{-x²}dx','∑1/n²','∇·F=0','a²+b²=c²','∂u/∂t=∇²u','lim x→∞','Δ=b²-4ac','φ=(1+√5)/2','i²=-1','sin²θ+cos²θ=1','F=Gm₁m₂/r²','E=mc²','F=ma','E=hf','ΔxΔp≥ℏ/2','PV=nRT','S=k·ln(W)'];

      var mouse = { x: -100, y: -100 };
      var trail = [], formulas = [], frame = 0, lastMove = Date.now();
      var isTouching = false, checkerCache = null, cachedTheme = '', animId = null, resizeTimer = null;

      function isDark() {
        return document.documentElement.getAttribute('data-theme') === 'dark' ||
          (!document.documentElement.getAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
      }

      function buildChecker() {
        var w = canvas.width, h = canvas.height;
        var theme = isDark() ? 'dark' : 'light';
        if (checkerCache && checkerCache.width === w && checkerCache.height === h && cachedTheme === theme) return;
        cachedTheme = theme;
        checkerCache = document.createElement('canvas');
        checkerCache.width = w;
        checkerCache.height = h;
        var c = checkerCache.getContext('2d');
        var d = isDark();
        c.fillStyle = d ? '#0f111a' : '#f6fbff';
        c.fillRect(0, 0, w, h);
        var ss = 20, bs = 100;
        var c1 = d ? 'rgba(200,220,255,0.04)' : 'rgba(60,120,200,0.06)';
        var c2 = d ? 'rgba(200,220,255,0.1)' : 'rgba(60,120,200,0.12)';
        c.strokeStyle = c1; c.lineWidth = 1;
        for (var x = 0; x <= w; x += ss) { if (x % bs !== 0) { c.beginPath(); c.moveTo(x + 0.5, 0); c.lineTo(x + 0.5, h); c.stroke(); } }
        for (var y = 0; y <= h; y += ss) { if (y % bs !== 0) { c.beginPath(); c.moveTo(0, y + 0.5); c.lineTo(w, y + 0.5); c.stroke(); } }
        c.strokeStyle = c2;
        for (var x = 0; x <= w; x += bs) { c.beginPath(); c.moveTo(x + 0.5, 0); c.lineTo(x + 0.5, h); c.stroke(); }
        for (var y = 0; y <= h; y += bs) { c.beginPath(); c.moveTo(0, y + 0.5); c.lineTo(w, y + 0.5); c.stroke(); }
      }

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        buildChecker();
        initFormulas();
      }

      function initFormulas() {
        formulas = [];
        var density = window.innerWidth < 768 ? 110000 : 80000;
        var count = Math.max(8, Math.min(25, Math.floor((canvas.width * canvas.height) / density)));
        for (var i = 0; i < count; i++) {
          formulas.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            content: FORMULAS[Math.floor(Math.random() * FORMULAS.length)],
            size: Math.random() * 12 + 14,
            opacity: 0,
            targetO: Math.random() * 0.28 + 0.22,
            fadeSpeed: Math.random() * 0.008 + 0.003,
            life: Math.random() * 600 + 300,
            vx: (Math.random() - 0.5) * 0.2,
            vy: (Math.random() - 0.5) * 0.2,
            phase: 'in'
          });
        }
      }

      function spawnParticle(cx, cy, px, py, isTouch) {
        var dx = cx - px, dy = cy - py, spd = Math.sqrt(dx * dx + dy * dy);
        var moving = spd > 2;
        var sx = moving ? dx * 0.18 + (Math.random() - 0.5) * 1.5 : (Math.random() - 0.5) * 1.2;
        var sy = moving ? dy * 0.18 + (Math.random() - 0.5) * 1.5 : Math.random() * 0.6 + 0.4;
        trail.push({
          x: cx + (Math.random() - 0.5) * 8,
          y: cy + (Math.random() - 0.5) * 8,
          s: SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)],
          life: 1,
          size: Math.random() * 8 + (isTouch ? 16 : 14),
          vx: sx, vy: sy
        });
        var max = isTouch ? 15 : 25;
        if (trail.length > max) trail.splice(0, trail.length - max);
      }

      function onMouseMove(e) {
        var prevX = mouse.x, prevY = mouse.y;
        mouse.x = e.clientX; mouse.y = e.clientY;
        spawnParticle(e.clientX, e.clientY, prevX, prevY, false);
        lastMove = Date.now();
      }

      function onTouchStart(e) {
        if (!e.touches.length) return;
        isTouching = true;
        var t = e.touches[0];
        mouse.x = t.clientX; mouse.y = t.clientY;
        for (var i = 0; i < 5; i++) spawnParticle(t.clientX, t.clientY, t.clientX - 10, t.clientY, true);
        lastMove = Date.now();
      }

      function onTouchMove(e) {
        if (!e.touches.length) return;
        var t = e.touches[0], px = mouse.x, py = mouse.y;
        mouse.x = t.clientX; mouse.y = t.clientY;
        spawnParticle(t.clientX, t.clientY, px, py, true);
        lastMove = Date.now();
      }

      function onTouchEnd() { isTouching = false; }

      function spawnIdle() {
        if (Date.now() - lastMove < 1000 || mouse.x < 0) return;
        trail.push({
          x: mouse.x + (Math.random() - 0.5) * 30,
          y: mouse.y + (Math.random() - 0.5) * 20,
          s: SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)],
          life: 1,
          size: Math.random() * 6 + (isTouching ? 14 : 12),
          vx: (Math.random() - 0.5) * 0.3,
          vy: Math.random() * 0.6 + 0.4
        });
        var max = isTouching ? 15 : 25;
        if (trail.length > max) trail.splice(0, trail.length - max);
      }

      function animate() {
        frame++;
        if (document.hidden) { animId = requestAnimationFrame(animate); return; }
        if (checkerCache) ctx.drawImage(checkerCache, 0, 0);
        var fc = isDark() ? 'rgba(180,200,240,0.85)' : 'rgba(40,50,80,0.65)';
        var updatePhy = frame % 2 === 0;
        for (var i = 0; i < formulas.length; i++) {
          var f = formulas[i];
          if (updatePhy) { f.x += f.vx; f.y += f.vy; f.life--; }
          if (f.phase === 'in') { f.opacity += f.fadeSpeed; if (f.opacity >= f.targetO) f.phase = 'hold'; }
          else if (f.phase === 'hold') { if (f.life < 80) f.phase = 'out'; }
          else if (f.phase === 'out') { f.opacity -= f.fadeSpeed; }
          if (f.life <= 0 || f.opacity <= 0 || f.x < -100 || f.x > canvas.width + 100 || f.y < -50 || f.y > canvas.height + 50) {
            formulas[i] = { x: Math.random() * canvas.width, y: Math.random() * canvas.height, content: FORMULAS[Math.floor(Math.random() * FORMULAS.length)], size: Math.random() * 12 + 14, opacity: 0, targetO: Math.random() * 0.28 + 0.22, fadeSpeed: Math.random() * 0.008 + 0.003, life: Math.random() * 600 + 300, vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2, phase: 'in' };
            continue;
          }
          if (f.opacity < 0.02) continue;
          ctx.save();
          ctx.globalAlpha = Math.max(0, f.opacity);
          ctx.fillStyle = fc;
          ctx.font = f.size + 'px "Times New Roman", serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(f.content, f.x, f.y);
          ctx.restore();
        }
        if (frame % 30 === 0) spawnIdle();
        var tc = isDark() ? 'rgba(96,165,250,0.95)' : 'rgba(37,99,235,0.9)';
        for (var i = trail.length - 1; i >= 0; i--) {
          var p = trail[i];
          p.life -= 0.007;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.055;
          p.vx *= 0.993;
          if (p.life <= 0) { trail.splice(i, 1); continue; }
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.life * 0.8);
          ctx.fillStyle = tc;
          ctx.font = p.size + 'px serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(p.s, Math.floor(p.x), Math.floor(p.y));
          ctx.restore();
        }
        animId = requestAnimationFrame(animate);
      }

      resize();
      window.addEventListener('resize', function () { clearTimeout(resizeTimer); resizeTimer = setTimeout(resize, 150); });
      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('touchstart', onTouchStart, { passive: true });
      window.addEventListener('touchmove', onTouchMove, { passive: true });
      window.addEventListener('touchend', onTouchEnd);
      var themeObs = new MutationObserver(function () { buildChecker(); });
      themeObs.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
      animate();
    }();

    // ── 主题切换 ──
    var btn = document.getElementById('themeToggle');
    btn.addEventListener('click', function () {
      var root = document.documentElement;
      var curr = root.getAttribute('data-theme');
      var next = curr === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      try { localStorage.setItem('latexSnipper-theme', next); } catch (e) {}
      updateThemeBtn(next);
    });

    function updateThemeBtn(theme) {
      var sunSvg = '<svg class="theme-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
      var moonSvg = '<svg class="theme-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      btn.innerHTML = theme === 'dark' ? sunSvg + '<span class="theme-label">白天</span>' : moonSvg + '<span class="theme-label">黑夜</span>';
    }

    // 初始化按钮
    (function () {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      updateThemeBtn(isDark ? 'dark' : 'light');
    })();
  </script>
</body>
</html>
