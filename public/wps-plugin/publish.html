<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
  <title>LaTeXSnipper — WPS 插件</title>
  <link rel="icon" type="image/png" href="/assets/images/icon.png">
  <script>
    try { var s = localStorage.getItem('latexSnipper-theme'); if (s === 'dark' || s === 'light') document.documentElement.setAttribute('data-theme', s); } catch (e) {}
  </script>
  <link rel="stylesheet" href="/styles/styles.css" media="all">
  <style>
    html { background: var(--bg); }
    body { background: transparent; }

    .spacer-top { height: 60px; }
    .top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--hdr-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--border-color); }
    .top-nav .inner { max-width: var(--max-w); margin: 0 auto; padding: 0 1.25rem; height: 48px; display: flex; align-items: center; gap: 1rem; }
    .top-nav a { color: var(--fg); text-decoration: none; font-size: 0.9rem; }
    .top-nav a:hover { color: var(--accent); }
    .top-nav .brand-link { font-weight: 700; font-size: 1rem; }
    .theme-toggle { margin-left: auto; background: none; border: 1px solid var(--border-color); border-radius: 20px; padding: 6px 12px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; color: var(--fg); }
    .theme-toggle:hover { background: rgba(128,128,128,0.1); border-color: var(--accent); }

    .page { max-width: var(--max-w); margin: 0 auto; padding: 3rem 1.25rem 5rem; text-align: center; }

    .page-title {
      font-size: 2rem; font-weight: 800; margin: 0 0 0.5rem;
      background: linear-gradient(135deg, var(--fg) 0%, var(--accent) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-sub { font-size: 1.05rem; color: var(--muted); margin: 0 0 2.5rem; }

    .card {
      background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px;
      padding: 2rem; backdrop-filter: blur(8px); box-shadow: var(--card-shadow);
      text-align: left; margin-bottom: 1.5rem;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--card-shadow-hover); }

    .card h2 { font-size: 1.25rem; font-weight: 700; margin: 0 0 1rem; color: var(--fg); }

    .step { display: flex; gap: 12px; margin-bottom: 1rem; align-items: flex-start; }
    .step-num {
      background: var(--accent); color: #fff; width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; flex-shrink: 0;
    }
    .step-text { line-height: 1.6; color: var(--card-text, var(--muted)); }
    .step-text strong { color: var(--fg); }

    .btn {
      display: inline-block; padding: 12px 28px; border-radius: 12px; font-size: 1rem; font-weight: 600;
      text-decoration: none; cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(37,99,235,0.3); }
    .btn-outline { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
    .btn-outline:hover { background: var(--accent); color: #fff; }
    .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; }

    .features { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 1rem; }
    .feature {
      background: var(--bg); border: 1px solid var(--border-color); border-radius: 12px;
      padding: 1rem; text-align: center; transition: border-color 0.2s;
    }
    .feature:hover { border-color: var(--accent); }
    .feature-icon { font-size: 1.5rem; margin-bottom: 4px; }
    .feature-text { font-size: 0.85rem; color: var(--muted); }

    .code-block {
      background: var(--bg); border: 1px solid var(--border-color); border-radius: 8px;
      padding: 0.75rem 1rem; font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace;
      font-size: 0.85rem; color: var(--muted); margin: 0.5rem 0; overflow-x: auto;
      word-break: break-all;
    }

    .footer { border-top: 1px solid var(--border-color); padding: 1rem 0; text-align: center; color: var(--muted); font-size: 0.9rem; }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .page-title { font-size: 1.5rem; }
      .features { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="spacer-top"></div>
  <nav class="top-nav">
    <div class="inner">
      <a href="/" class="brand-link">LaTeXSnipper</a>
      <a href="/user_manual.html">用户手册</a>
      <a href="/download.html">下载</a>
      <a href="https://github.com/SakuraMathcraft/LaTeXSnipper" target="_blank" rel="noopener">GitHub</a>
      <button class="theme-toggle" onclick="toggleTheme()">
        <span class="theme-icon" id="themeIcon"></span>
        <span class="theme-label" id="themeLabel"></span>
      </button>
    </div>
  </nav>

  <main class="page">
    <h1 class="page-title">WPS Office 插件</h1>
    <p class="page-sub">在 WPS 中直接插入和管理 LaTeX 公式</p>

    <div class="card">
      <h2>安装方法</h2>
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">下载插件压缩包</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">解压到任意目录</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">打开 WPS Office → <strong>扩展</strong> → <strong>插件管理</strong> → <strong>从本地安装</strong></div>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <div class="step-text">选择解压后的 <strong>wps-plugin</strong> 文件夹</div>
      </div>
      <div class="btn-row">
        <a href="LaTeXSnipper-wps.zip" class="btn btn-primary" download>下载插件 (35KB)</a>
      </div>
    </div>

    <div class="card">
      <h2>功能介绍</h2>
      <div class="features">
        <div class="feature">
          <div class="feature-icon">&#128290;</div>
          <div class="feature-text">插入 LaTeX 公式（行内 / 独立 / 编号）</div>
        </div>
        <div class="feature">
          <div class="feature-icon">&#128247;</div>
          <div class="feature-text">公式截图识别 (OCR)</div>
        </div>
        <div class="feature">
          <div class="feature-icon">&#128221;</div>
          <div class="feature-text">加载与删除已有公式</div>
        </div>
        <div class="feature">
          <div class="feature-icon">&#128295;</div>
          <div class="feature-text">自动编号与重新编号</div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    &copy; 2026 LaTeXSnipper — <a href="https://github.com/SakuraMathcraft/LaTeXSnipper" target="_blank">GitHub</a>
  </footer>

  <script>
    function getTheme() {
      var s = localStorage.getItem('latexSnipper-theme');
      if (s === 'dark' || s === 'light') return s;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('themeIcon').textContent = t === 'dark' ? '\u2600' : '\u263E';
      document.getElementById('themeLabel').textContent = t === 'dark' ? '浅色' : '深色';
    }
    function toggleTheme() {
      var next = getTheme() === 'dark' ? 'light' : 'dark';
      localStorage.setItem('latexSnipper-theme', next);
      applyTheme(next);
    }
    applyTheme(getTheme());
  </script>
</body>
</html>
