<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaTeXSnipper</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        .container {
            padding: 16px;
        }
        
        h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #1976d2;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        textarea {
            width: 100%;
            height: 100px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: #1976d2;
        }
        
        .preview {
            min-height: 60px;
            padding: 8px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 16px;
        }
        
        .buttons {
            display: flex;
            gap: 8px;
        }
        
        button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn-primary {
            background: #1976d2;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1565c0;
        }
        
        .btn-secondary {
            background: white;
            color: #1976d2;
            border: 1px solid #1976d2;
        }
        
        .btn-secondary:hover {
            background: #e3f2fd;
        }
        
        .status {
            margin-top: 16px;
            padding: 8px;
            background: #e8f5e9;
            border-radius: 4px;
            font-size: 12px;
            color: #2e7d32;
        }
        
        .status.error {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>LaTeX 公式</h2>
        
        <div class="form-group">
            <label for="latex-input">输入 LaTeX 公式</label>
            <textarea id="latex-input" placeholder="例如: E = mc^2">E = mc^2</textarea>
        </div>
        
        <div class="form-group">
            <label>预览</label>
            <div id="preview" class="preview">
                <span style="color: #999;">输入公式后显示预览</span>
            </div>
        </div>
        
        <div class="buttons">
            <button id="btn-insert-omml" class="btn-primary">插入公式 (OMML)</button>
            <button id="btn-insert-image" class="btn-secondary">插入图片</button>
        </div>
        
        <div id="status" class="status">
            检查 Bridge 连接...
        </div>
    </div>
    
    <script>
        // Bridge connection status
        let bridgeConnected = false;
        
        // Check bridge connection
        async function checkBridge() {
            try {
                const response = await fetch('http://127.0.0.1:28765/config');
                const data = await response.json();
                bridgeConnected = true;
                document.getElementById('status').textContent = '已连接到 Bridge';
                document.getElementById('status').className = 'status';
            } catch (error) {
                bridgeConnected = false;
                document.getElementById('status').textContent = 'Bridge 未连接，将使用本地渲染';
                document.getElementById('status').className = 'status error';
            }
        }
        
        // Insert formula
        async function insertFormula(type) {
            const latex = document.getElementById('latex-input').value.trim();
            if (!latex) {
                alert('请输入 LaTeX 公式');
                return;
            }
            
            try {
                const response = await fetch('http://127.0.0.1:28765/convert/latex', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        latex: latex,
                        display: true,
                        targets: [type]
                    })
                });
                
                const result = await response.json();
                
                if (result.ok) {
                    // Call WPS API to insert
                    if (type === 'omml' && result.result.omml) {
                        window.parent.insertOMML(result.result.omml);
                    } else if (type === 'png' && result.result.png_base64) {
                        window.parent.insertImage(result.result.png_base64);
                    }
                } else {
                    alert('公式转换失败: ' + result.error.message);
                }
            } catch (error) {
                alert('插入公式失败: ' + error.message);
            }
        }
        
        // Event listeners
        document.getElementById('btn-insert-omml').addEventListener('click', () => {
            insertFormula('omml');
        });
        
        document.getElementById('btn-insert-image').addEventListener('click', () => {
            insertFormula('png');
        });
        
        // Check bridge on load
        checkBridge();
    </script>
</body>
</html>
