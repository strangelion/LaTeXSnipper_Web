<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WPS加载项配置</title>
<style>
body{margin:30px;font-family:"Microsoft YaHei",sans-serif}
.addonList{max-width:800px;margin:0 auto;padding:18px;border:1px solid #ddd;border-radius:4px}
.addonItem{font-size:14px;line-height:36px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.addonItem:hover{border-radius:2px;border:1px dashed #ccc;padding:4px 0}
.addonItemTitle{border-bottom:1px solid #ddd;font-weight:bold}
.addonItemTitle:hover{border:0;padding:0}
.col1{width:12%;text-align:left}
.col2{width:8%}
.col3{width:8%}
.col4{width:35%;word-break:break-all}
.col5{width:10%}
.col6{width:10%}
.col7{width:7%}
.btn{padding:4px 12px;background:#417ff9;border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:13px}
.btn:hover{background:#5696ff}
.btn-danger{background:#f56c6c}
.btn-danger:hover{background:#f78989}
.status{padding:2px 8px;border-radius:4px;font-size:12px;text-align:center}
.status-ok{background:#e6f7e6;color:#2d8a2d}
.status-err{background:#fde2e2;color:#d9534f}
.status-wait{background:#f5f5f5;color:#999}
.ClearAll{max-width:800px;margin:20px auto 0;padding:8px;text-align:center;border:1px dashed #ccc;border-radius:4px;cursor:pointer;font-size:14px}
.ClearAll:hover{background:#f5f5f5}
</style>
</head>
<body>
<h2 style="max-width:800px;margin:0 auto 20px">WPS 加载项配置</h2>
<div class="addonList" id="addonList">
  <div class="addonItem addonItemTitle">
    <div class="col1">加载项名称</div>
    <div class="col2">类型</div>
    <div class="col3">加载方式</div>
    <div class="col4">URL</div>
    <div class="col5">自定义域名</div>
    <div class="col6">管理</div>
    <div class="col7">状态</div>
  </div>
</div>
<div class="ClearAll" onclick="clearAll()">禁用所有 WPS 加载项</div>

<script>
var PLUGIN_URL = "https://latexsnipper.interknot.dpdns.org/wps-plugin/";
var serverVersion = "wait";

// addons to publish
var publishList = [
  {name:"LaTeXSnipper", addonType:"wps", online:"true", url: PLUGIN_URL}
];

function getHttpObj(){
  if(window.XMLHttpRequest) return new XMLHttpRequest();
  return new ActiveXObject("Microsoft.XMLHTTP");
}

function InitWpsCloudSvr(){
  window.location.href = "ksoWPSCloudSvr://start=RelayHttpServer";
}

function startWps(req, data, callback){
  function doTry(tryCount, bPop){
    if(tryCount < 1){
      if(callback) callback({status:2, message:"请允许浏览器打开 WPS Office"});
      return;
    }
    var xhr = getHttpObj();
    xhr.open(req.type, req.url);
    xhr.timeout = 3000;
    xhr.onload = function(){
      if(xhr.status === 200){
        if(callback) callback({status:0, res:xhr});
      } else {
        if(bPop) InitWpsCloudSvr();
        setTimeout(function(){ doTry(tryCount-1, false); }, 2000);
      }
    };
    xhr.onerror = xhr.ontimeout = function(){
      if(bPop) InitWpsCloudSvr();
      setTimeout(function(){ doTry(tryCount-1, false); }, 1000);
    };
    xhr.send(data);
  }
  doTry(4, true);
}

function formatSendData(data){
  var str = JSON.stringify(data);
  // base64 encode
  return btoa(unescape(encodeURIComponent(str)));
}

function install(addon){
  var data = {
    cmd: "enable",
    name: addon.name,
    url: addon.url,
    addonType: addon.addonType || "wps",
    online: addon.online || "true",
    version: addon.version || "1.0.0",
    customDomain: addon.customDomain || ""
  };
  var req = {url:"http://localhost:58890/deployaddons/runParams", type:"POST"};
  startWps(req, formatSendData(data), function(res){
    if(res.status === 0){
      if(res.res.responseText === "OK" || res.res.status === 200){
        alert("配置成功！请重启 WPS Office 使用插件。");
        location.reload();
      } else {
        alert("配置失败：" + res.res.responseText);
      }
    } else {
      alert(res.message);
    }
  });
}

function uninstall(addon){
  var data = {
    cmd: "disable",
    name: addon.name,
    url: addon.url,
    addonType: addon.addonType || "wps",
    online: addon.online || "true",
    version: addon.version || "1.0.0",
    customDomain: addon.customDomain || ""
  };
  var req = {url:"http://localhost:58890/deployaddons/runParams", type:"POST"};
  startWps(req, formatSendData(data), function(res){
    if(res.status === 0){
      alert("已卸载！");
      location.reload();
    } else {
      alert(res.message);
    }
  });
}

function clearAll(){
  if(!confirm("确定要禁用所有 WPS 加载项吗？")) return;
  var req = {url:"http://localhost:58890/deployaddons/runParams", type:"POST"};
  startWps(req, formatSendData({cmd:"disableall"}), function(res){
    location.reload();
  });
}

function checkAddon(addon, element){
  var url = addon.url + "ribbon.xml";
  var xhr = getHttpObj();
  xhr.open("POST", "http://localhost:58890/redirect/runParams");
  xhr.timeout = 5000;
  xhr.onload = function(){
    if(xhr.responseText && xhr.responseText.indexOf("<customUI") === 0){
      var st = document.getElementById(addon.name + "_status");
      if(st){ st.innerHTML = "正常"; st.className = "status status-ok"; }
    }
  };
  xhr.onerror = xhr.ontimeout = function(){};
  var send = formatSendData({method:"get", url:url, data:""});
  xhr.send(send);
}

// init
(function(){
  var list = document.getElementById("addonList");
  // try to get local installed addons
  var req = {url:"http://localhost:58890/version", type:"POST"};
  startWps(req, "", function(res){
    if(res.status === 0){
      serverVersion = res.res.responseText;
      // load local addons
      var req2 = {url:"http://127.0.0.1:58890/publishlist", type:"POST"};
      startWps(req2, "", function(res2){
        if(res2.status === 0){
          try {
            var local = JSON.parse(res2.res.responseText);
            // show publish list with install/uninstall buttons
            publishList.forEach(function(addon){
              var installed = local.find(function(l){ return l.name === addon.name && l.enable === "true"; });
              renderAddon(addon, installed ? "installed" : "new");
            });
          } catch(e) {
            publishList.forEach(function(addon){ renderAddon(addon, "new"); });
          }
        } else {
          publishList.forEach(function(addon){ renderAddon(addon, "new"); });
        }
      });
    } else {
      // WPS not running, show install buttons
      publishList.forEach(function(addon){ renderAddon(addon, "new"); });
    }
  });
})();

function renderAddon(addon, state){
  var list = document.getElementById("addonList");
  var typeLabel = addon.addonType === "et" ? "电子表格" : addon.addonType === "wpp" ? "演示" : "文字";
  var loadLabel = addon.online === "true" ? "在线" : "离线";
  var btnHtml = state === "installed"
    ? '<button class="btn btn-danger" onclick="uninstall('+JSON.stringify(addon).replace(/"/g,'&quot;')+')">卸载</button>'
    : '<button class="btn" onclick="install('+JSON.stringify(addon).replace(/"/g,'&quot;')+')">安装</button>';
  var statusHtml = state === "installed"
    ? '<span class="status status-ok">已安装</span>'
    : '<span class="status status-wait">未安装</span>';

  var div = document.createElement("div");
  div.className = "addonItem";
  div.innerHTML =
    '<div class="col1">' + addon.name + '</div>' +
    '<div class="col2">' + typeLabel + '</div>' +
    '<div class="col3">' + loadLabel + '</div>' +
    '<div class="col4">' + addon.url + '</div>' +
    '<div class="col5">' + (addon.customDomain||"") + '</div>' +
    '<div class="col6">' + btnHtml + '</div>' +
    '<div class="col7" id="' + addon.name + '_status">' + statusHtml + '</div>';
  list.appendChild(div);

  // check addon availability
  checkAddon(addon, div);
}
</script>
</body>
</html>
